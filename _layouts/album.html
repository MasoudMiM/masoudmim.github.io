---
layout: default
---
<div class="post">
  <header class="post-header">
    <h1 class="post-title">
      {{ page.flag }} {{ page.title }}
    </h1>
    <p class="post-description">
      {{ page.country }} · {{ page.year }}
      {% if page.description %} · {{ page.description }}{% endif %}
    </p>
  </header>

  <div class="row row-cols-2 row-cols-md-3 g-2 mt-1">
    {% for photo in page.photos %}
    <div class="col">
      <a href="{{ photo | relative_url }}"
         data-lightbox="{{ page.slug }}"
         data-title="{{ page.title }} — {{ forloop.index }}">
        <img src="{{ photo | relative_url }}"
             class="img-fluid rounded"
             style="width:100%;height:200px;object-fit:cover;"
             loading="lazy"
             alt="{{ page.title }} photo {{ forloop.index }}">
      </a>
    </div>
    {% endfor %}
  </div>

  <div class="mt-4 d-flex gap-2 align-items-center">
    <a href="{{ '/photos/' | relative_url }}" class="btn btn-sm btn-outline-secondary">
      ← Back to albums
    </a>
    <span style="font-size:0.8rem;color:#6c757d;">{{ page.photos | size }} photos</span>
  </div>
</div>

<!-- Lightbox2 -->
<link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.4/css/lightbox.min.css">
<script
  src="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.4/js/lightbox.min.js">
</script>
<script>
lightbox.option({ resizeDuration: 200, wrapAround: true, albumLabel: 'Photo %1 of %2' });
</script>
